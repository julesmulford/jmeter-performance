name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Smoke Tests
        run: |
          mvn verify -Djmeter.test.files.included="smoke.jmx" \
                     -Djmeter.save.saveservice.output_format=csv

      - name: Upload Smoke Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-smoke-results
          path: target/jmeter/

  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    needs: smoke-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Load Tests
        run: |
          mvn verify -Djmeter.test.files.included="load.jmx" \
                     -Djmeter.save.saveservice.output_format=csv \
                     -Dthreads=10 \
                     -Dramp_up=15 \
                     -Dduration=60

      - name: Upload Load Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-load-results
          path: target/jmeter/
